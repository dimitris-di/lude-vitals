name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check release metadata
        run: scripts/check-release-metadata.sh

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (release, arm64)
        run: swift build -c release --arch arm64

      - name: Run tests
        run: swift test -c release

      - name: Assemble .app
        run: make app

      - name: Verify .app signature
        run: scripts/verify-release-artifacts.sh

      - name: Inspect bundle
        run: |
          ls -la LudeVitals.app/Contents/
          file LudeVitals.app/Contents/MacOS/LudeVitals

      - name: Upload .app artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: LudeVitals-app
          path: LudeVitals.app
          retention-days: 7
