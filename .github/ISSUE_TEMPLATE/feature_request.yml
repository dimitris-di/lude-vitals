name: Feature request
description: Suggest a new metric, view, or behavior for LudeVitals.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. LudeVitals deliberately stays small. Please describe the concrete use case so we can weigh it against the scope.

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem are you trying to solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should LudeVitals do? Be specific about UI placement, sampling rate, data shown.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or alternative designs you thought about.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require network access.
        - label: This does not require new third-party dependencies.
        - label: I would be willing to help implement or test this.
